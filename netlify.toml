[build]
  command = "npx expo export --platform web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# API routes → Netlify Functions
[[redirects]]
  from = "/api/materialen"
  to = "/.netlify/functions/materialen"
  status = 200

[[redirects]]
  from = "/api/analyseer"
  to = "/.netlify/functions/analyseer"
  status = 200

# SPA fallback: alle onbekende routes → index.html (client-side navigatie)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
